# The key is the exact name of the label you want to apply
# The value is the regex pattern to match against the title and body

urgent:
  - '(?i)(urgent|critical|asap|blocker)'

bug:
  - '(?i)(bug|broken|error|crash|failing|fix|issue)'

documentation:
  - '(?i)(docs|documentation|readme|typo)'

enhancement:
  - '(?i)(enhancement|feature|feat|improvement|suggestion)'