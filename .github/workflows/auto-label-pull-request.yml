name: Auto Label Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: '.github/pull-request-labeler-config.yml'
